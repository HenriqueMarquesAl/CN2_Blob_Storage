<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Cloud Storage - Auditoria</title>
    <style>
        :root {
            --primary: #0078d4;
            --secondary: #2b88d8;
            --bg: #f4f7f9;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 30px;
        }

        /* Estilo do Formulário */
        .upload-section {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--secondary);
        }

        /* Tabela de Logs */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .badge-ip {
            font-family: monospace;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .download-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>☁️ Gerenciador Azure Storage</h1>

    <div class="upload-section">
        <h2>Upload de Imagem</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="arquivo" required>
            <button type="submit">🚀 Enviar para Nuvem</button>
        </form>
    </div>

    <div class="section">
        <h2>📂 Arquivos no Blob Storage</h2>
        <button onclick="listar()">🔄 Atualizar Lista</button>
        <ul id="lista">
            <li style="color: #999;">Clique em atualizar para ver os arquivos...</li>
        </ul>
    </div>

    <div class="section">
        <h2>📑 Logs de Auditoria (Table Storage)</h2>
        <button onclick="verLogs()">🔍 Ver Logs de Cadastro</button>
        
        <table id="tabelaLogs" style="display: none;">
            <thead>
                <tr>
                    <th>Arquivo</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>IP Origem</th>
                </tr>
            </thead>
            <tbody id="corpoLogs">
                </tbody>
        </table>
        <p id="msgLogs" style="margin-top: 10px; color: #666;">Os logs aparecerão aqui.</p>
    </div>
</div>

<script>
    // Lista arquivos do Blob Storage
    async function listar() {
        const res = await fetch('/listar_json');
        const arquivos = await res.json();
        const lista = document.getElementById("lista");
        
        lista.innerHTML = "";
        
        if (arquivos.length === 0) {
            lista.innerHTML = "<li>Nenhum arquivo encontrado.</li>";
            return;
        }

        arquivos.forEach(nome => {
            const li = document.createElement("li");
            li.innerHTML = `
                <span>${nome}</span>
                <a href="/download/${nome}" class="download-link">⬇️ Download</a>
            `;
            lista.appendChild(li);
        });
    }

    // Busca os Logs do Table Storage e renderiza na tabela
    async function verLogs() {
        const res = await fetch('/logs');
        const logs = await res.json();
        
        const tabela = document.getElementById("tabelaLogs");
        const corpo = document.getElementById("corpoLogs");
        const msg = document.getElementById("msgLogs");

        corpo.innerHTML = "";

        if (logs.length === 0) {
            msg.textContent = "Nenhum log encontrado na Azure.";
            tabela.style.display = "none";
            return;
        }

        msg.style.display = "none";
        tabela.style.display = "table";

        logs.forEach(log => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>${log.nomeFoto || 'N/A'}</strong></td>
                <td>${log.dataCadastro || '-'}</td>
                <td>${log.horarioCadastro || '-'}</td>
                <td><span class="badge-ip">${log.ipMaquina || 'Unknown'}</span></td>
            `;
            corpo.appendChild(tr);
        });
    }

    // Carregar lista automaticamente ao abrir
    window.onload = () => {
        listar();
    };
</script>

</body>
</html>
